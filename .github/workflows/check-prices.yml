name: Check Prices

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: node scripts/check-prices.mjs
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          WORKER_URL: ${{ secrets.WORKER_URL || 'https://softbuydeals.ghodke-mangesh2.workers.dev' }}
